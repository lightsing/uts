[package]
description = "Core types and traits for OpenTimestamps in Rust"
documentation = "https://docs.rs/uts-core/"
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
name = "uts-core"
repository.workspace = true
version.workspace = true

[[bin]]
name = "uts-info"
path = "src/bin/uts_info.rs"
required-features = ["std"]

[dependencies]
auto_impl.workspace = true
digest.workspace = true
hex.workspace = true
paste.workspace = true
ripemd.workspace = true
sha1.workspace = true
sha2.workspace = true
sha3.workspace = true
smallvec = { workspace = true, features = ["specialization", "may_dangle"] }
thiserror.workspace = true
tracing = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }

[features]
default = ["std"]
tracing = ["dep:tracing"]
std = []
bytes = ["dep:bytes"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
opentimestamps = { git = "https://github.com/opentimestamps/rust-opentimestamps" }
