repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo-fmt
        entry: cargo +nightly fmt --
        language: system
        types: [rust]
        pass_filenames: true
      - id: taplo-fmt
        name: taplo-fmt
        entry: taplo fmt
        language: system
        types: [toml]
        pass_filenames: true
      - id: forge-fmt
        name: forge fmt
        entry: forge fmt
        language: system
        files: \.sol$
      - id: prettier
        name: prettier
        entry: prettier --write
        language: system
        files: \.(js|jsx|ts|tsx|json|css|scss|md|html|toml)$
        pass_filenames: true
