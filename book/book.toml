[book]
authors = ["UTS Contributors"]
base_url = "https://book.timestamps.now"
language = "en"
multilingual = false
src = "src"
title = "UTS: Universal Timestamps"

[build]
build-dir = "build"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.katex]
command = "mdbook-katex"

[output.html]
additional-js = ["mermaid.min.js", "mermaid-init.js"]
