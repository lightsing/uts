[project]
authors = [
  { name = "Akase Haruka", email = "light.tsing@gmail.com" },
]
dependencies = [
  "web3>=7.0.0",
  "httpx>=0.27.0",
  "yarl>=1.9.0",
  "cryptography>=44.0.0",
  "eth-hash[pycryptodome]>=0.7.0",
]
description = "Python SDK for Universal Timestamps"
license = { text = "MIT OR Apache-2.0" }
name = "uts-python-sdk"
readme = "README.md"
requires-python = ">=3.10,<4"
version = "0.1.0"

[project.optional-dependencies]
dev = [
  "pytest>=9.0.0",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.0.0",
  "black>=26.0.0",
  "ruff>=0.15.0",
  "mypy>=1.19.0",
]

[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core>=2.0.0,<3.0.0"]

[tool.poetry]
packages = [
  { include = "uts_sdk", from = "src" },
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "C4", "SIM"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
  "pytest-cov (>=7.0.0,<8.0.0)",
]
