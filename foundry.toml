[profile.default]
ast = true
build_info = true
extra_output = ["storageLayout"]
ffi = true
fs_permissions = [{ access = "read", path = "target/foundry" }]
ignored_error_codes = [
  2018, # Function state mutability can be restricted to pure
]
libs = ["lib"]
out = "target/foundry"
script = "contract-scripts"
solc_version = "0.8.24"
src = "contracts"
test = "contract-tests"
